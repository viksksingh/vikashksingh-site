  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

id=\"experience\" data-screen-label=\"Experience\" style=\"position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 40px 6vw 90px; box-sizing: border-box\">\n    <div class=\"reveal\" style=\"margin-bottom: 48px\">\n      <div style=\"font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: #2DD4BF; font-weight: 600; margin-bottom: 12px\">Career<\u002Fdiv>\n      <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-size: clamp(28px, 3vw, 40px); margin: 0; color: #F1F7FB; font-weight: 700\">Experience<\u002Fh2>\n    <\u002Fdiv>\n\n    <!-- INTERACTIVE TIMELINE -->\n    <div class=\"reveal\" style=\"background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 36px 34px 28px; margin-bottom: 40px\">\n      <div style=\"position: relative; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; margin: 26px 20px 0\">\n        <div style=\"position: absolute; left: 0; top: 0; bottom: 0; width: {{ timelineFill }}; background: linear-gradient(90deg, #2DD4BF, #22D3EE); border-radius: 2px; transition: width 0.5s ease\"><\u002Fdiv>\n        <sc-for list=\"{{ milestones }}\" as=\"m\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ m.select }}\" style=\"position: absolute; left: {{ m.x }}; top: 50%; transform: translate(-50%, -50%); width: 18px; height: 18px; border-radius: 50%; border: 2px solid {{ m.dotBorder }}; background: {{ m.dotBg }}; cursor: pointer; padding: 0; transition: all 0.25s\" style-hover=\"border-color: #67E8F9; transform: translate(-50%, -50%) scale(1.25)\">\n            <span style=\"position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%); font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; color: {{ m.yearColor }}; white-space: nowrap\">{{ m.year }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-top: 44px; min-height: 84px\" data-comment-anc Fsection>\n\n  <!-- ENGAGEMENTS -->\n  <section id=\"engagements\" data-screen-label=\"Engagements\" style=\"position: relative; z-index: 1; background: #0A1017; border-top: 1px solid rgba(255,255,255,0.06); border-bottom: 1px solid rgba(255,255,255,0.06)\">\n    <div style=\"max-width: 1280px; margin: 0 auto; padding: 90px 6vw; box-sizing: border-box\">\n      <div class=\"reveal\" style=\"margin-bottom: 48px; display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; flex-wrap: wrap\">\n        <div>\n          <div style=\"font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: #2DD4BF; font-weight: 600; margin-bottom: 12px\">Selected work<\u002Fdiv>\n          <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-size: clamp(28px, 3vw, 40px); margin: 0; color: #F1F7FB; font-weight: 700\">Strategic engagements<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"font-size: 15px; color: #9FB2BF; margin: 0; max-width: 380px; line-height: 1.6\">A sample from 25+ digital strategy, transformation and delivery programs across four continents.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 250px 1fr; gap: 36px; align-items: start\">\n        <!-- SKILLS SIDEBAR -->\n        <div class=\"reveal\" style=\"position: sticky; top: 96px; display: flex; flex-direction: column; gap: 8px\">\n          <div style=\"font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: #5C7183; font-weight: 600; margin-bottom: 8px\">Filter by skill<\u002Fdiv>\n          <sc-for list=\"{{ skills }}\" as=\"sk\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ sk.select }}\" style=\"text-align: left; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; font-weight: 500; color: {{ sk.color }}; background: {{ sk.bg }}; border: 1px solid {{ sk.border }}; border-radius: 8px; padding: 11px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 8px; transition: all 0.25s\" style-hover=\"border-color: rgba(45,212,191,0.5)\">\n              <span>{{ sk.label }}<\u002Fspan>\n              <span style=\"font-family: 'Space Grotesk', sans-serif; font-size: 12px; color: {{ sk.countColor }}\">{{ sk.count }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; align-content: start\">\n        <sc-for list=\"{{ engagements }}\" as=\"e\" hint-placeholder-count=\"6\">\n          <div class=\"reveal\" style=\"background: #0D141C; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 28px; display: flex; flex-direction: column; gap: 12px; transition: border-color 0.3s, transform 0.3s\" style-hover=\"border-color: rgba(45,212,191,0.45); transform: translateY(-3px)\">\n            <div style=\"display: flex; justify-content: space-between; align-items: center; gap: 12px\">\n              <span style=\"font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: #67E8F9; font-weight: 600\">{{ e.sector }}<\u002Fspan>\n              <span style=\"font-size: 13px; color: #5C7183; font-weight: 500\">{{ e.metric }}<\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"margin: 0; font-family: 'Space Grotesk', sans-serif; font-size: 18px; color: #F1F7FB; font-weight: 600; line-height: 1.35\">{{ e.title }}<\u002Fh3>\n            <p style=\"margin: 0; font-size: 14.5px; line-height: 1.6; color: #9FB2BF\">{{ e.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- WORLD MAP -->\n      <div class=\"reveal\" style=\"margin-top: 56px; background: #0D141C; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 34px; overflow: hidden\">\n        <div style=\"display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 12px; margin-bottom: 8px\">\n "294\" y=\"125\" text-anchor=\"middle\">United States<\u002Ftext>\n            <text x=\"500\" y=\"95\" text-anchor=\"middle\">United Kingdom<\u002Ftext>\n            <text x=\"367\" y=\"316\" text-anchor=\"middle\">Brazil<\u002Ftext>\n            <text x=\"578\" y=\"345\" text-anchor=\"middle\">South Africa<\u002Ftext>\n            <text x=\"654\" y=\"172\" text-anchor=\"end\">Oman<\u002Ftext>\n            <text x=\"705\" y=\"187\" text-anchor=\"middle\">India<\u002Ftext>\n            <text x=\"787\" y=\"200\" text-anchor=\"start\">Thailand<\u002Ftext>\n            <text x=\"774\" y=\"241\" text-anchor=\"end\">Malaysia<\u002Ftext>\n            <text x=\"797\" y=\"258\" text-anchor=\"start\">Singapore<\u002Ftext>\n            <text x=\"797\" y=\"285\" text-anchor=\"middle\">Indonesia<\u002Ftext>\n            <text x=\"822\" y=\"361\" text-anchor=\"middle\" fill=\"#2DD4BF\" font-weight=\"600\">Perth · Home base<\u002Ftext>\n          <\u002Fg>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- RECOGNITION -->\n  <section id=\"recognition\" data-screen-label=\"Recognition\" style=\"position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 90px 6vw; box-sizing: border-box\">\n    <div class=\"reveal\" style=\"margin-bottom: 48px\">\n      <div style=\"font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: #2DD4BF; font-weight: 600; margin-bottom: 12px\">Recognition<\u002Fdiv>\n      <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-size: clamp(28px, 3vw, 40px); margin: 0; color: #F1F7FB; font-weight: 700\">Patent, awards &amp; thought leadership<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px\">\n      <div class=\"reveal\" style=\"grid-column: 1 / -1; background: linear-gradient(120deg, rgba(45,212,191,0.12), rgba(34,211,238,0.04)); border: 1px solid rgba(45,212,191,0.35); border-radius: 12px; padding: 34p
